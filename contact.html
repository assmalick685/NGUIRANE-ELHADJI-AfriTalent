    <main>

        <!-- CONTACT -->
        <section>
            <div class="container">

                <h2>Contacter-nous</h2>

                <div class="row">

                    <!-- FORMULAIRE -->
                     <div class="col-md-6">

                        <form action="">

                            <!-- NOM -->
                            <div>
                                <label for="nom">Nom</label>
                                <input type="text" id="nom">
                                <small></small>
                            </div>

                             <!-- PRENOM -->
                            <div>
                                <label for="prenom">Prénom</label>
                                <input type="text" id="prenom">
                                <small></small>
                            </div>

                            <!-- EMAIL -->
                              <div>
                                <label for="email">E-mail</label>
                                <input type="email" id="email">
                                <small></small>
                             </div>

                             <!-- SUJET -->
                              <div>
                                <label for="sujet">Sujet</label>

                                <select name="" id="sujet">
                                    <option value="">Choisir un sujet</option>
                                    <option value="">Support</option>
                                    <option value="">Recrutement</option>
                                    <option value="">Partenariat</option>
                                </select>

                                <small></small>
                              </div>

                              <!-- MESSAGE -->
                               <div>
                                    <label for="message">Message</label>
                                    <textarea name="" id="message" rows="5"></textarea>
                                    <small></small>
                               </div>

                               <!-- BUTTON -->
                                <button type="submit" class="btn">Envoyer</button>
                        </form>
                     </div>

                     <!-- INFOS -->
                    <div class="col-md-6">

                        <h2>Informations</h2>

                        <p><i class="bi bi-envelope"></i>contactafritalent@gmail.com</p>

                        <p><i class="bi bi-telephone"></i>77 378 29 93</p>

                        <p><i class="bi bi-geo-alt"></i>Dakr, Sénégal</p>

                    </div>
                </div>
            </div>
        </section>

        <!-- GOOGLE MAPS -->
         <div class="container">
